<!DOCTYPE html>
<html>
<head>
    <title>HDI Predictor</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            text-align:center;
        }

        .container{
            width:400px;
            margin:50px auto;
            padding:20px;
            background:white;
            border-radius:10px;
            box-shadow:0px 0px 10px gray;
        }

        input{
            width:90%;
            padding:10px;
            margin:8px;
        }

        button{
            background:#007bff;
            color:white;
            border:none;
            padding:10px 20px;
            cursor:pointer;
            border-radius:5px;
        }

        button:hover{
            background:#0056b3;
        }

        h1{
            color:#333;
        }
    </style>
</head>

<body>

<div class="container">

<h1>🌍 Human Development Index Predictor</h1>

<form action="/predict" method="post">

<input type="text" name="life"
placeholder="Life Expectancy">

<input type="text" name="school"
placeholder="Mean Years of Schooling">

<input type="text" name="expected"
placeholder="Expected Years of Schooling">

<input type="text" name="income"
placeholder="GNI Per Capita">

<button type="submit">Predict HDI</button>

</form>

<h2>Predicted HDI: {{ prediction }}</h2>
<h2>Category: {{ category }}</h2>

</div>

</body>
</html>
